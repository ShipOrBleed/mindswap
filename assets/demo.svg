<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520">
  <style>
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { opacity: 0 } }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    .bg { fill: #0d1117; }
    .bar { fill: #161b22; }
    .dot-r { fill: #ff5f57; }
    .dot-y { fill: #febc2e; }
    .dot-g { fill: #28c840; }
    .prompt { fill: #8b949e; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; }
    .cmd { fill: #e6edf3; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; font-weight: bold; }
    .output { fill: #8b949e; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }
    .highlight { fill: #c9956b; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }
    .green { fill: #3fb950; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }
    .white { fill: #e6edf3; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }
    .dim { fill: #484f58; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }
    .yellow { fill: #d29922; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }
    .title { fill: #8b949e; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 11px; }
    .cursor { fill: #c9956b; animation: blink 1s step-end infinite; }
    .line1 { animation: fadeIn 0.3s ease 0.5s both; }
    .line2 { animation: fadeIn 0.3s ease 0.8s both; }
    .line3 { animation: fadeIn 0.3s ease 1.1s both; }
    .line4 { animation: fadeIn 0.3s ease 1.4s both; }
    .line5 { animation: fadeIn 0.3s ease 1.7s both; }
    .line6 { animation: fadeIn 0.3s ease 2.0s both; }
    .line7 { animation: fadeIn 0.3s ease 2.3s both; }
    .line8 { animation: fadeIn 0.3s ease 2.6s both; }
    .line9 { animation: fadeIn 0.3s ease 2.9s both; }
    .line10 { animation: fadeIn 0.3s ease 3.2s both; }
    .line11 { animation: fadeIn 0.3s ease 3.5s both; }
    .line12 { animation: fadeIn 0.3s ease 3.8s both; }
    .line13 { animation: fadeIn 0.3s ease 4.1s both; }
    .line14 { animation: fadeIn 0.3s ease 4.4s both; }
    .line15 { animation: fadeIn 0.3s ease 4.7s both; }
    .line16 { animation: fadeIn 0.3s ease 5.0s both; }
    .line17 { animation: fadeIn 0.3s ease 5.3s both; }
    .line18 { animation: fadeIn 0.3s ease 5.6s both; }
    .line19 { animation: fadeIn 0.3s ease 5.9s both; }
    .line20 { animation: fadeIn 0.3s ease 6.2s both; }
  </style>

  <!-- Terminal window -->
  <rect class="bg" width="680" height="520" rx="10"/>
  <rect class="bar" width="680" height="36" rx="10"/>
  <rect class="bg" x="0" y="26" width="680" height="10"/>
  <circle class="dot-r" cx="20" cy="18" r="6"/>
  <circle class="dot-y" cx="38" cy="18" r="6"/>
  <circle class="dot-g" cx="56" cy="18" r="6"/>
  <text class="title" x="600" y="22">~/my-app</text>

  <!-- Command 1: mindswap -->
  <g class="line1">
    <text class="prompt" x="20" y="60">$</text>
    <text class="cmd" x="35" y="60">npx mindswap</text>
  </g>

  <g class="line2">
    <text class="highlight" x="20" y="85">⚡ Saving project state...</text>
  </g>

  <g class="line3">
    <text class="dim" x="20" y="110">  Task:</text>
    <text class="white" x="90" y="110">user auth</text>
    <text class="dim" x="190" y="110">(auto-detected from branch)</text>
  </g>

  <g class="line4">
    <text class="dim" x="20" y="130">  Branch:</text>
    <text class="white" x="105" y="130">feat/user-auth</text>
  </g>

  <g class="line5">
    <text class="dim" x="20" y="150">  Changed:</text>
    <text class="white" x="113" y="150">4 files</text>
  </g>

  <g class="line6">
    <text class="dim" x="20" y="170">  Tests:</text>
    <text class="green" x="90" y="170">✓ 12 passed, 0 failed</text>
  </g>

  <g class="line7">
    <text class="dim" x="20" y="190">  Decisions:</text>
    <text class="white" x="125" y="190">2 auto-logged from deps</text>
  </g>

  <g class="line8">
    <text class="dim" x="20" y="210">  Quality:</text>
    <text class="green" x="105" y="210">A (92/100)</text>
  </g>

  <g class="line9">
    <text class="green" x="20" y="240">✓ State saved — ready to switch tools</text>
  </g>

  <!-- Command 2: switch -->
  <g class="line10">
    <text class="prompt" x="20" y="270">$</text>
    <text class="cmd" x="35" y="270">npx mindswap switch cursor</text>
  </g>

  <g class="line11">
    <text class="highlight" x="20" y="295">⚡ Switching to Cursor IDE</text>
  </g>

  <g class="line12">
    <text class="dim" x="20" y="315">  1.</text>
    <text class="green" x="50" y="315">✓</text>
    <text class="white" x="65" y="315">State saved</text>
  </g>

  <g class="line13">
    <text class="dim" x="20" y="335">  2.</text>
    <text class="green" x="50" y="335">✓</text>
    <text class="white" x="65" y="335">Context files updated (15 tools)</text>
  </g>

  <g class="line14">
    <text class="dim" x="20" y="355">  3.</text>
    <text class="green" x="50" y="355">✓</text>
    <text class="white" x="65" y="355">Cursor IDE opened</text>
  </g>

  <g class="line15">
    <text class="green" x="20" y="385">✓ Ready for Cursor</text>
  </g>

  <!-- Command 3: done -->
  <g class="line16">
    <text class="prompt" x="20" y="415">$</text>
    <text class="cmd" x="35" y="415">npx mindswap done "auth shipped"</text>
  </g>

  <g class="line17">
    <text class="highlight" x="20" y="440">⚡ Task completed</text>
  </g>

  <g class="line18">
    <text class="dim" x="20" y="460">  Task:</text>
    <text class="white" x="90" y="460">user auth</text>
  </g>

  <g class="line19">
    <text class="dim" x="20" y="480">  Status:</text>
    <text class="green" x="105" y="480">completed → idle</text>
  </g>

  <g class="line20">
    <text class="prompt" x="20" y="510">$</text>
    <rect class="cursor" x="35" y="498" width="8" height="15" rx="1"/>
  </g>
</svg>
